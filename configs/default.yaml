# Default WRDNet training configuration
# Phase 0: Warmup (joint training without domain adaptation)

model:
  dehazeformer_variant: 'T'
  yolo_variant: 's'
  pretrained: true
  input_size_dehaze: 320
  input_size_detect: 640
  fsg_channels: [256, 256, 512]  # P3, P4, P5 channels (verified from YOLOv11s)
  use_depth: true
  use_dg_fsg: false  # Set to true for E12 (DG-FSG experiment)

# Data configuration
data:
  data_root: 'data'
  fog_density: '0.02'
  input_size: 640
  real_datasets: ['acdc', 'zurich']

training:
  phase: 'warmup'
  epochs: 30
  batch_size: 16
  num_workers: 4
  lr: 1.0e-3
  optimizer: 'AdamW'
  weight_decay: 1.0e-4
  scheduler: 'cosine'
  warmup_epochs: 5

  # Loss weights
  lambda_rest: 0.5
  lambda_depth: 0.1
  lambda_entropy: 0.01
  lambda_domain: 0.1
  lambda_fsg: 0.01

  # Logging
  log_interval: 100
  save_interval: 5
  checkpoint_dir: 'experiments/checkpoints'
  log_dir: 'experiments/logs'

  # Early stopping
  early_stopping: true
  early_stopping_patience: 10
  early_stopping_metric: 'mAP@50'

domain_adaptation:
  use_fda: false
  use_dct_align: false
  use_fsg_consistency: false
  use_tta: false

  # FDA schedule (only active when use_fda: true)
  fda_start_epoch: 30
  fda_beta_schedule:
    - [30, 0.00]
    - [60, 0.02]
    - [90, 0.04]
    - [120, [0.01, 0.06]]

seed: 42
