# E5: E3 + DCT Alignment
# Feature-level domain adaptation

model:
  dehazeformer_variant: 'T'
  yolo_variant: 's'
  pretrained: true
  input_size_dehaze: 320
  input_size_detect: 640
  fsg_channels: [256, 512, 1024]
  use_depth: false
  use_dg_fsg: false

training:
  phase: 'dct_align'
  epochs: 90
  batch_size: 8
  lr: 5.0e-4
  optimizer: 'AdamW'
  weight_decay: 1.0e-4
  scheduler: 'cosine'
  warmup_epochs: 5

  lambda_rest: 0.5
  lambda_depth: 0.0
  lambda_entropy: 0.0
  lambda_domain: 0.1
  lambda_fsg: 0.0

  synthetic_data: 'data/foggy_cityscapes'
  real_data:
    - 'data/acdc/rgb_anon/fog'
    - 'data/dawn/Images/fog'

  log_interval: 100
  save_interval: 5
  checkpoint_dir: 'experiments/checkpoints/e5'
  log_dir: 'experiments/logs/e5'

  early_stopping: true
  early_stopping_patience: 10
  early_stopping_metric: 'mAP@50'

domain_adaptation:
  use_fda: false
  use_dct_align: true
  use_fsg_consistency: false
  use_tta: false

seed: 42
